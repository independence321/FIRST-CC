<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --focus: #e74c3c;
    --focus-light: #ff6b6b;
    --break: #2ecc71;
    --break-light: #58d68d;
    --text: #eee;
    --text-muted: #999;
    --ring-bg: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", "Helvetica Neue", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.6s;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  /* ---- Mode label ---- */
  .mode-label {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 6px 20px;
    border-radius: 20px;
    background: var(--card);
    transition: all 0.4s;
  }
  .mode-label.focus { color: var(--focus-light); background: rgba(231,76,60,0.12); }
  .mode-label.break { color: var(--break-light); background: rgba(46,204,113,0.12); }

  /* ---- Timer ring ---- */
  .ring-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
  }

  .ring-wrapper svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke: var(--focus);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke 0.4s;
  }
  .ring-progress.break-mode { stroke: var(--break); }

  /* ---- Timer text ---- */
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-size: 4rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    transition: color 0.4s;
  }
  .time-display.focus { color: var(--focus-light); }
  .time-display.break { color: var(--break-light); }

  .time-label {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* ---- Controls ---- */
  .controls {
    display: flex;
    gap: 16px;
  }

  .btn {
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    outline: none;
  }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--focus);
    color: #fff;
    min-width: 140px;
  }
  .btn-start:hover { background: #c0392b; box-shadow: 0 4px 20px rgba(231,76,60,0.35); }
  .btn-start.break-mode { background: var(--break); }
  .btn-start.break-mode:hover { background: #27ae60; box-shadow: 0 4px 20px rgba(46,204,113,0.35); }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 2px solid var(--text-muted);
  }
  .btn-reset:hover { color: var(--text); border-color: var(--text); }

  /* ---- Stats ---- */
  .stats {
    display: flex;
    gap: 30px;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .stats span { font-weight: 700; color: var(--focus-light); }

  /* ---- Footer hint ---- */
  .hint {
    color: var(--text-muted);
    font-size: 0.75rem;
    opacity: 0.6;
  }

  /* ---- Flashing animation ---- */
  @keyframes flash-bg {
    0%, 100% { background: var(--bg); }
    50% { background: #2d1a1a; }
  }
  body.flash-focus { animation: flash-bg 0.8s ease-in-out 4; }

  @keyframes flash-bg-break {
    0%, 100% { background: var(--bg); }
    50% { background: #1a2d1a; }
  }
  body.flash-break { animation: flash-bg-break 0.8s ease-in-out 4; }
</style>
</head>
<body>

<div class="container">

  <!-- 模式标签 -->
  <div class="mode-label focus" id="modeLabel">🍅 专 注</div>

  <!-- 圆形进度环 -->
  <div class="ring-wrapper">
    <svg viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="92"/>
      <circle class="ring-progress" id="ring" cx="100" cy="100" r="92"
              stroke-dasharray="578" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <span class="time-display focus" id="timeDisplay">25:00</span>
      <span class="time-label" id="timeLabel">分钟</span>
    </div>
  </div>

  <!-- 按钮 -->
  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="toggleTimer()">开 始</button>
    <button class="btn btn-reset" id="btnReset" onclick="resetTimer()">重 置</button>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div>今日完成 <span id="countSessions">0</span> 个番茄</div>
  </div>

  <!-- 提示 -->
  <div class="hint">空格键 开始/暂停 &nbsp;|&nbsp; R 键 重置</div>

</div>

<script>
  // ============ 配置 ============
  const FOCUS_MINUTES = 25;
  const BREAK_MINUTES = 5;

  // ============ 状态 ============
  let mode = 'focus';          // 'focus' | 'break'
  let totalSeconds = FOCUS_MINUTES * 60;
  let remainingSeconds = totalSeconds;
  let timerId = null;
  let running = false;
  let sessionCount = 0;

  // 圆环周长 (r=92 → C ≈ 578.05)
  const CIRCUMFERENCE = 2 * Math.PI * 92; // ≈ 578.05

  // ============ DOM 引用 ============
  const $modeLabel   = document.getElementById('modeLabel');
  const $timeDisplay = document.getElementById('timeDisplay');
  const $timeLabel   = document.getElementById('timeLabel');
  const $ring        = document.getElementById('ring');
  const $btnStart    = document.getElementById('btnStart');
  const $btnReset    = document.getElementById('btnReset');
  const $count       = document.getElementById('countSessions');
  const $body        = document.body;

  // ============ 初始化圆环 ============
  $ring.style.strokeDasharray = CIRCUMFERENCE;
  $ring.style.strokeDashoffset = '0';

  // ============ 渲染函数 ============
  function updateDisplay() {
    const mins = Math.floor(remainingSeconds / 60);
    const secs = remainingSeconds % 60;
    $timeDisplay.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

    // 进度环
    const progress = remainingSeconds / totalSeconds;
    $ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  }

  function updateModeUI() {
    if (mode === 'focus') {
      $modeLabel.textContent = '🍅 专 注';
      $modeLabel.className = 'mode-label focus';
      $timeDisplay.className = 'time-display focus';
      $ring.classList.remove('break-mode');
      $btnStart.classList.remove('break-mode');
      document.title = '🍅 专注中… ' + $timeDisplay.textContent;
    } else {
      $modeLabel.textContent = '☕ 休 息';
      $modeLabel.className = 'mode-label break';
      $timeDisplay.className = 'time-display break';
      $ring.classList.add('break-mode');
      $btnStart.classList.add('break-mode');
      document.title = '☕ 休息中… ' + $timeDisplay.textContent;
    }
  }

  // ============ 计时逻辑 ============
  function tick() {
    remainingSeconds--;

    if (remainingSeconds <= 0) {
      finish();
      return;
    }

    updateDisplay();
    // 更新标题
    const mins = Math.floor(remainingSeconds / 60);
    const secs = remainingSeconds % 60;
    const t = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    document.title = (mode === 'focus' ? '🍅 ' : '☕ ') + t;
  }

  function toggleTimer() {
    if (running) {
      pause();
    } else {
      start();
    }
  }

  function start() {
    if (running) return;

    // 请求通知权限
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }

    running = true;
    $btnStart.textContent = '暂 停';
    updateModeUI();

    timerId = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    clearInterval(timerId);
    timerId = null;
    $btnStart.textContent = '继 续';
    updateModeUI();
  }

  function resetTimer() {
    pause();
    totalSeconds = mode === 'focus' ? FOCUS_MINUTES * 60 : BREAK_MINUTES * 60;
    remainingSeconds = totalSeconds;
    $btnStart.textContent = '开 始';
    updateDisplay();
    updateModeUI();
  }

  function finish() {
    clearInterval(timerId);
    timerId = null;
    running = false;
    remainingSeconds = 0;
    updateDisplay();

    // 播放提示音
    playAlarm();

    // 桌面通知
    if (mode === 'focus') {
      sessionCount++;
      $count.textContent = sessionCount;
      notify('🍅 专注时间结束！', '太棒了！休息一下吧～');
      flashBody('focus');
      // 切换到休息模式
      mode = 'break';
    } else {
      notify('☕ 休息时间结束！', '准备好开始新的番茄了吗？');
      flashBody('break');
      // 切换到专注模式
      mode = 'focus';
    }

    totalSeconds = mode === 'focus' ? FOCUS_MINUTES * 60 : BREAK_MINUTES * 60;
    remainingSeconds = totalSeconds;
    $btnStart.textContent = '开 始';
    updateDisplay();
    updateModeUI();
  }

  // ============ 提示音（Web Audio API） ============
  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // 三连音：叮-叮-叮
      const notes = [880, 1100, 1320]; // A5, C#6, E6
      const startTimes = [0, 0.15, 0.3];

      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type = 'sine';
        osc.frequency.value = freq;

        const t = ctx.currentTime + startTimes[i];
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

        osc.start(t);
        osc.stop(t + 0.45);
      });

      // 关闭 context 稍后
      setTimeout(() => ctx.close(), 2000);
    } catch (e) {
      // 静默处理
    }
  }

  // ============ 桌面通知 ============
  function notify(title, body) {
    if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: '🍅' });
    }
  }

  // ============ 视觉闪烁 ============
  function flashBody(m) {
    const cls = m === 'focus' ? 'flash-focus' : 'flash-break';
    $body.classList.add(cls);
    setTimeout(() => $body.classList.remove(cls), 3500);
  }

  // ============ 键盘快捷键 ============
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') {
      e.preventDefault();
      toggleTimer();
    } else if (e.code === 'KeyR') {
      resetTimer();
    }
  });

  // ============ 初始化 ============
  updateDisplay();
  updateModeUI();
</script>
</body>
</html>
